# This file contains the configuration for this project.
# When you update `info` or `fileAssociations`, run `wails3 task common:update:build-assets` to update the assets.
# Note that this will overwrite any changes you have made to the assets.
version: '3'

# This information is used to generate the build assets.
# The `version` field is overwritten by the release workflow from the pushed git tag.
info:
  companyName: "Andrew Collington"
  productName: "MCP Overwatch"
  productIdentifier: "com.amnuts.mcpoverwatch"
  description: "A unified gateway for Model Context Protocol servers"
  copyright: "(c) 2026, Andrew Collington"
  comments: "MCP Overwatch - MCP Server Manager"
  version: "0.0.0"

# Dev mode configuration
dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - "*.go"
      - "*.js" # Watch for changes to JS/TS files included using the //wails:include directive.
      - "*.ts" # The frontend directory will be excluded entirely by the setting above.
    git_ignore: true
  executes:
    - cmd: wails3 build DEV=true
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: wails3 task run
      type: primary

